name: Day28 Docker CI Pipeline


on: push


jobs: 
  docker-build:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4


      - name: Show files
        run: ls -la


      - name: Build Docker Image
        run: docker build -t sweety-devops-project .


      - name: Show Docker Images
        run: docker images


      - name: Pipeline Successful
        run: echo "Docker CI Pipeline completed successfully
